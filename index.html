<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Março</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffe4ec;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      color: #d63384;
      margin: 10px 0;
      text-align: center;
      font-size: 24px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
      position: sticky;
      top: 0;
      background: #ffe4ec;
      z-index: 10;
    }

    .weekdays div {
      text-align: center;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4d88, #ff80ab);
      color: white;
      border-radius: 14px;
      padding: 18px 10px;
      font-size: 24px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .weekdays div:nth-child(1) {
      background: linear-gradient(135deg, #ff2e63, #ff6b81);
    }

    .weekdays div:nth-child(7) {
      background: linear-gradient(135deg, #6a5acd, #9370db);
    }

    .calendar {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .day {
      background-color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      transition: 0.2s;
      min-height: 85px;
      position: relative;
    }

    .day:hover {
      transform: scale(1.05);
    }

    /* TEXTO DOS EVENTOS */
    .day span {
      font-size: 20px;
      font-weight: 900;
      margin-top: 4px;
      line-height: 1.2;
    }

    /* FIM DE SEMANA */
    .day:nth-child(7n+1) {
      background-color: #ffe5ec;
    }

    .day:nth-child(7n) {
      background-color: #e6e6fa;
    }

    .event {
      background-color: #ff80ab !important;
      color: white;
    }

    .selected {
      outline: 3px solid #d63384;
      transform: scale(1.05);
    }

    /* 🔴 BOLINHA DE EVENTO */
    .event::after {
      content: '';
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: 6px;
      right: 6px;
    }

    #description {
      padding: 20px;
      background-color: white;
      border-top: 3px solid #ff4d88;
      min-height: 120px;
      font-size: 18px;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .animate {
      transform: translateY(20px);
      opacity: 0;
    }

    /* 📱 RESPONSIVO */
    @media (max-width: 600px) {

      h1 {
        font-size: 18px;
      }

      .weekdays div {
        font-size: 14px;
        padding: 10px 5px;
      }

      .calendar {
        gap: 5px;
      }

      .day {
        min-height: 60px;
        padding: 4px;
      }

      /* ESCONDE TEXTO NO CELULAR */
      .day span {
        display: none;
      }

      .day div {
        font-size: 16px;
      }

      #description {
        font-size: 16px;
        padding: 15px;
      }
    }

  </style>
</head>
<body>

  <h1>Calendário de Março</h1>

  <div class="weekdays" id="weekdays"></div>
  <div class="calendar" id="calendar"></div>

  <div id="description">Clique em um dia com evento para ver os detalhes.</div>

  <script>
    const calendar = document.getElementById('calendar');
    const weekdays = document.getElementById('weekdays');
    const description = document.getElementById('description');

    const year = 2026;
    const month = 2;

    const totalDays = new Date(year, month + 1, 0).getDate();
    const startDay = new Date(year, month, 1).getDay();

    const events = {
     
      
      20: [
        { title: "Trabalho de Arte", description: "Último dia para finalizar." }
      ],
      23: [
        { title: "Geografia", description: "Mapa da casa até a escola." },
        { title: "CPRT", description: "Pesquisa em sala." },
        { title: "Sociologia", description: "Entregar atividade em dupla." },
        { title: "Filosofia", description: "Apresentação do seminário." },
        { title: "ED Fisica", description: "Atividade avaliativa sobre musculos e ossos, em sala de aula" }
        
      ],
      24: [
       
        { title: "Biologia", description: "Apresentação dos métodos cientificos" },
        { title: "Artes", description: "Seminário de arte" },
        { title: "Ingles", description: "Atividade de inglês, PDF" },
        
      ],
      25: [
        { title: " PROVA Legislação empresarial", description: "Prova!!" }

      ],
      28: [
        { title: "Quimica", description: "Trazer itens para experimento" }
      ],
    };

    const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    daysOfWeek.forEach(day => {
      const div = document.createElement('div');
      div.innerText = day;
      weekdays.appendChild(div);
    });

    for (let i = 0; i < startDay; i++) {
      calendar.appendChild(document.createElement('div'));
    }

    let selectedDayElement = null;

    for (let i = 1; i <= totalDays; i++) {
      const dayDiv = document.createElement('div');
      dayDiv.classList.add('day');

      const number = document.createElement('div');
      number.innerText = i;
      dayDiv.appendChild(number);

      if (events[i]) {
        dayDiv.classList.add('event');

        events[i].forEach(ev => {
          const span = document.createElement('span');
          span.innerText = ev.title;
          dayDiv.appendChild(span);
        });

        dayDiv.onclick = () => selectDay(dayDiv, i);
      }

      calendar.appendChild(dayDiv);
    }

    function selectDay(element, day) {
      if (selectedDayElement) {
        selectedDayElement.classList.remove('selected');
      }

      element.classList.add('selected');
      selectedDayElement = element;

      showEvent(day);
    }

    function animateChange(callback) {
      description.classList.add('animate');

      setTimeout(() => {
        callback();
        description.classList.remove('animate');
      }, 300);
    }

    function showEvent(day) {
      animateChange(() => {
        if (events[day]) {
          let html = "";
          events[day].forEach(ev => {
            html += `<strong>${ev.title}:</strong><br>${ev.description}<br><br>`;
          });
          description.innerHTML = html;
        }
      });
    }

  </script>

</body>
</html>
