<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Eventos</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffe4ec;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      color: #d63384;
      margin: 10px 0;
      text-align: center;
      font-size: 22px;
    }

    /* 🔥 DIAS DA SEMANA */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
      position: sticky;
      top: 0;
      background: #ffe4ec;
      z-index: 10;
    }

    .weekdays div {
      text-align: center;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4d88, #ff80ab);
      color: white;
      border-radius: 14px;
      padding: 18px 10px;
      font-size: 26px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* 🔴 Domingo */
    .weekdays div:nth-child(1) {
      background: linear-gradient(135deg, #ff2e63, #ff6b81);
    }

    /* 🟣 Sábado */
    .weekdays div:nth-child(7) {
      background: linear-gradient(135deg, #6a5acd, #9370db);
    }

    .calendar {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
      width: 100%;
    }

    .day {
      background-color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      transition: 0.2s;
      min-height: 80px;
    }

    .day:hover {
      transform: scale(1.05);
    }

    .day span {
      font-size: 16px;
      font-weight: 700;
      margin-top: 5px;
    }

    /* 🔴 Domingo (dias) */
    .day:nth-child(7n+1) {
      background-color: #ffe5ec;
    }

    /* 🟣 Sábado (dias) */
    .day:nth-child(7n) {
      background-color: #e6e6fa;
    }

    .event {
      background-color: #ff80ab !important;
      color: white;
    }

    .selected {
      outline: 3px solid #d63384;
      transform: scale(1.05);
    }

    #description {
      padding: 20px;
      background-color: white;
      border-top: 3px solid #ff4d88;
      width: 100%;
      min-height: 120px;
      font-size: 18px;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .animate {
      transform: translateY(20px);
      opacity: 0;
    }

  </style>
</head>
<body>

  <h1>Calendário de Eventos</h1>

  <div class="weekdays" id="weekdays"></div>
  <div class="calendar" id="calendar"></div>

  <div id="description">Clique em um dia com evento para ver os detalhes.</div>

  <script>
    const calendar = document.getElementById('calendar');
    const weekdays = document.getElementById('weekdays');
    const description = document.getElementById('description');

    const totalDays = 31;
    const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    // Criar cabeçalho
    daysOfWeek.forEach(day => {
      const div = document.createElement('div');
      div.innerText = day;
      weekdays.appendChild(div);
    });

    // Ajuste do início do mês
    const startDay = 3;

    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement('div');
      calendar.appendChild(empty);
    }

    let selectedDayElement = null;

    for (let i = 1; i <= totalDays; i++) {
      const dayDiv = document.createElement('div');
      dayDiv.classList.add('day');

      const number = document.createElement('div');
      number.innerText = i;
      dayDiv.appendChild(number);

      if (i === 3) {
        dayDiv.classList.add('event');
        const eventText = document.createElement('span');
        eventText.innerText = 'Almoço em família';
        dayDiv.appendChild(eventText);
        dayDiv.onclick = () => selectDay(dayDiv, i);
      }

      if (i === 5) {
        dayDiv.classList.add('event');
        const eventText = document.createElement('span');
        eventText.innerText = 'Compras do mês';
        dayDiv.appendChild(eventText);
        dayDiv.onclick = () => selectDay(dayDiv, i);
      }

      calendar.appendChild(dayDiv);
    }

    function selectDay(element, day) {
      if (selectedDayElement) {
        selectedDayElement.classList.remove('selected');
      }

      element.classList.add('selected');
      selectedDayElement = element;

      showEvent(day);
    }

    function animateChange(callback) {
      description.classList.add('animate');

      setTimeout(() => {
        callback();
        description.classList.remove('animate');
      }, 300);
    }

    function showEvent(day) {
      animateChange(() => {
        if (day === 3) {
          description.innerHTML = "<strong>Almoço em família:</strong><br>Momento especial com a família.";
        } else if (day === 5) {
          description.innerHTML = "<strong>Compras do mês:</strong><br>Dia de comprar mantimentos e itens necessários.";
        }
      });
    }
  </script>

</body>
</html>
