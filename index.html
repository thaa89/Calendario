<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário</title>

 <style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background-color: #ffe4ec;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== TÍTULO ===== */
h1 {
  color: #d63384;
  margin: 10px 0;
  text-align: center;
  font-size: 24px;
}

/* ===== BOTÕES ===== */
.buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
}

button {
  margin: 10px 0;
  padding: 12px 22px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff4d88, #ff80ab);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

button:disabled {
  background: #ffc1d6;
  cursor: not-allowed;
  opacity: 0.6;
  box-shadow: none;
}

/* ===== DIAS DA SEMANA ===== */
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 10px;
  position: sticky;
  top: 0;
  background: #ffe4ec;
  z-index: 10;
}

.weekdays div {
  text-align: center;
  font-weight: 900;
  background: linear-gradient(135deg, #ff4d88, #ff80ab);
  color: white;
  border-radius: 14px;
  padding: 14px;
  font-size: 18px;
}

/* ===== CALENDÁRIO ===== */
.calendar {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 10px;
}

.day {
  background: white;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  padding: 6px;
  font-size: 14px;
  font-weight: bold;

  display: flex;
  flex-direction: column;

  aspect-ratio: 1 / 1; /* 🔥 quadrado perfeito */
}

/* número do dia */
.day > div {
  font-size: 14px;
}

/* títulos */
.day span {
  font-size: 10px;
  margin-top: 2px;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ===== ESTADOS ===== */
.event {
  background-color: #ff80ab !important;
  color: white;
}

.today {
  border: 2px solid #78b6be;
}

.selected {
  outline: 2px solid #ff4d88;
}

/* ===== FINS DE SEMANA ===== */
.weekend-sat {
  background-color: #ffe0f0 !important;
}

.weekend-sun {
  background-color: #ffd6e7 !important;
}

/* ===== LINKS ===== */
a {
  color: #ff4d88;
  font-weight: bold;
  text-decoration: none;
}

/* ===== DESCRIÇÃO ===== */
#description {
  padding: 16px;
  background: white;
  border-top: 3px solid #ff4d88;
  font-size: 16px;
}

/* ========================= */
/* 📱 MOBILE LIMPO E CERTO */
/* ========================= */
@media (max-width: 600px) {

  h1 {
    font-size: 20px;
  }

  .buttons {
    gap: 6px;
  }

  button {
    flex: 1;
    padding: 8px;
    font-size: 13px;
  }

  .weekdays {
    gap: 4px;
    padding: 6px;
  }

  .weekdays div {
    font-size: 12px;
    padding: 6px;
    background: none;
    color: #d63384;
  }

  .calendar {
    gap: 4px;
    padding: 6px;
  }

  .day {
    font-size: 11px;
    padding: 4px;
  }

  .day span {
    font-size: 9px;
  }

  #description {
    font-size: 14px;
    padding: 12px;
  }
}
</style>
  


  </style>
</head>
<body>

  <h1 id="title"></h1>

  <div class="buttons">
    <button onclick="prevMonth()">← Mês anterior</button>
    <button onclick="nextMonth()">Próximo mês →</button>
  </div>

  <div class="weekdays" id="weekdays"></div>
  <div class="calendar" id="calendar"></div>

  <div id="description">Clique em um dia com evento para ver os detalhes.</div>

  <script>
    const calendar = document.getElementById('calendar');
    const weekdays = document.getElementById('weekdays');
    const description = document.getElementById('description');
    const title = document.getElementById('title');

    const year = 2026;
    let month = 4;

    const today = new Date();
    const todayDay = today.getDate();
    const todayMonth = today.getMonth();
    const todayYear = today.getFullYear();

    const eventsMay = {
      4: [
        {
          title: "- Mapa mental de Sociologia", description: "Fazer apenas um mapa mental sobre a >primeira revolução industrial e a revolução francesa<, usando o 1 cap do livro"
        }
      ],
      6: [
        {
          title: "- Blog da Mara", 
          description: "Escolher 5 temas do blog e explicar o porque de você ter os escolhido (min de 15 linhas cada motivo)",
          files: [
            {
              url: "https://hemetec.wordpress.com/",
              label: "Blog da Mara"
            },
            {
              url: "https://www.facebook.com/opergaminho2014",
              label: "Facebook do blog"
            }
          ]
        },
        {
          title: " -  Apres. de Slides de Historia", description: "Fazer e apresentar slides referentes a questao 5 do livro 👇",
          files:  [
    {
      url: "https://drive.google.com/file/d/1YycOH3vuqeNMx7gilRgsZWfdGSkTJBIw/preview",
      label: "Perguntas de 1 a 5"
    }
  ]
}
        
      ],

      9: [
        {
          title: "- Sábado Letivo com Café! ☕", description: "Enquete para os alimentos no grupo!"
        }
      ],

      11: [
        {
          title: "- Apostila&livro de Geografia", description: "Fazer as paginas: 41, 42, 43, 44, 45, 46, 47 da apostila digital E pagina 15 do livro",
          files: [
            {
              url: "https://drive.google.com/file/d/1tOTF-Z9Y9Bd5yeup3bXV7UJWttNjvx6_/preview",
              label: "Apostila digital 📱"
            },
            {
              url: "https://drive.google.com/file/d/1Pn-pnSFBAV7HQaiMA2PnsqxyHf6gwoMm/preview",
              label:"Pagina 15 do livro 📖"
            }
          ]
        }
      ],

      12: [
        { title: "- Apresentação de Ingles", description: "Apresentação final Todo Mundo Odeia o Chris" },

        {
          title: "- Atividade de PORA", 
          description: "Elaborar uma lista de tarefas semanal seguindo as regras do PDF abaixo 👇",
          files: [
            {
              url: "https://docs.google.com/document/d/1MFxYoxx0Yp4F356tBQdZlgcdzCyECrn2/preview",
              label: "PDF de PORA"
            }
          ]
        }
      ],

      13: [
        {
          title: "-Roteiro contos africanos (Historia)", description: "Roteiro do video em grupo (4), com base no conto, contendo biografia do autor e historia do pais, enquete no grupo"
        }
      ],

      14: [
        {
          title: "- 3 frases para Português", description: "Fazer 3 frases usando cada figura de linguagem presente no pdf",
          files: [
            {
              url: "https://docs.google.com/document/d/1rbIgC75RN4GPD9ugxgAaLOmZQInO9e7L/preview",
              label: "PDF/material de apoio"
            }
          ]
        }
      ]
    };

    const daysOfWeek = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const monthNames = ['','','','','Maio'];

    function getEvents() {
      if (month === 4) return eventsMay;
      return {};
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      weekdays.innerHTML = "";

      title.innerText = `Calendário de ${monthNames[month]}`;



      daysOfWeek.forEach(day => {
        const div = document.createElement('div');
        div.innerText = day;
        weekdays.appendChild(div);
      });

      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDay = new Date(year, month, 1).getDay();
      const events = getEvents();

      for (let i = 0; i < startDay; i++) {
        calendar.appendChild(document.createElement('div'));
      }

      for (let i = 1; i <= totalDays; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.classList.add('day');

        /* ADIÇÃO */
        const dayOfWeek = new Date(year, month, i).getDay();
        if (dayOfWeek === 0) dayDiv.classList.add('weekend-sun');
        if (dayOfWeek === 6) dayDiv.classList.add('weekend-sat');

        const number = document.createElement('div');
        number.innerText = i;
        dayDiv.appendChild(number);

        if (i === todayDay && month === todayMonth && year === todayYear) {
          dayDiv.classList.add('today');
        }

        if (events[i]) {
          dayDiv.classList.add('event');

          events[i].forEach(ev => {
            const span = document.createElement('span');
            span.innerText = ev.title;
            dayDiv.appendChild(span);
          });

          dayDiv.onclick = () => {

            document.querySelectorAll('.day').forEach(d => {
              d.classList.remove('selected');
            });

            dayDiv.classList.add('selected');

            let html = "";

            events[i].forEach(ev => {
              html += `<strong>${ev.title}</strong><br>${ev.description}<br><br>`;

              if (ev.files) {
                ev.files.forEach(f => {
                  html += `
                    <a href="${f.url}" target="_blank">
                      ${f.label}
                    </a><br><br>
                  `;
                });
              }
            });

            description.innerHTML = html;
          };
        }

        calendar.appendChild(dayDiv);
      }
// MOSTRAR TODOS OS EVENTOS AO ABRIR
let initialHtml = "";

Object.keys(events).forEach(day => {
  events[day].forEach(ev => {
    initialHtml += `<strong>Dia ${day} - ${ev.title}</strong><br>${ev.description}<br><br>`;

    if (ev.files) {
      ev.files.forEach(f => {
        initialHtml += `
          <a href="${f.url}" target="_blank">
            ${f.label}
          </a><br><br>
        `;
      });
    }
  });
});

description.innerHTML = initialHtml;
      updateButtons();
    }

    function nextMonth() {}
    function prevMonth() {}

    function updateButtons() {
      const buttons = document.querySelectorAll("button");
      buttons[0].disabled = true;
      buttons[1].disabled = true;
    }

    renderCalendar();
  </script>

</body>
</html>
