<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Eventos</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffe4ec;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      color: #d63384;
      margin: 10px 0;
      text-align: center;
      font-size: 22px;
    }

    .calendar {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
      width: 100%;
    }

    .header {
      text-align: center;
      font-weight: bold;
      background: #ffd6e7;
      border-radius: 8px;
      padding: 6px;
    }

    .day {
      background-color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      text-align: left;
      transition: 0.2s;
      min-height: 70px;
    }

    .day span {
      font-size: 14px;
      font-weight: 600;
      margin-top: 4px;
    }

    .event {
      background-color: #ff80ab;
      color: white;
    }

    .selected {
      outline: 2px solid #d63384;
      transform: scale(1.03);
    }

    #description {
      padding: 15px;
      background-color: white;
      border-top: 2px solid #ff80ab;
      width: 100%;
      min-height: 100px;
      font-size: 16px;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .animate {
      transform: translateY(20px);
      opacity: 0;
    }
  </style>
</head>
<body>

  <h1>Calendário de Eventos</h1>

  <div class="calendar" id="calendar"></div>

  <div id="description">Clique em um dia com evento para ver os detalhes.</div>

  <script>
    const calendar = document.getElementById('calendar');
    const description = document.getElementById('description');
    const totalDays = 31;

    const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    // Cabeçalho (funciona em PC e celular)
    daysOfWeek.forEach(day => {
      const header = document.createElement('div');
      header.classList.add('header');
      header.innerText = day;
      calendar.appendChild(header);
    });

    let selectedDayElement = null;

    for (let i = 1; i <= totalDays; i++) {
      const dayDiv = document.createElement('div');
      dayDiv.classList.add('day');

      const number = document.createElement('div');
      number.innerText = i;
      dayDiv.appendChild(number);

      if (i === 3) {
        dayDiv.classList.add('event');
        const eventText = document.createElement('span');
        eventText.innerText = 'Almoço em família';
        dayDiv.appendChild(eventText);
        dayDiv.onclick = () => selectDay(dayDiv, i);
      }

      if (i === 5) {
        dayDiv.classList.add('event');
        const eventText = document.createElement('span');
        eventText.innerText = 'Compras do mês';
        dayDiv.appendChild(eventText);
        dayDiv.onclick = () => selectDay(dayDiv, i);
      }

      calendar.appendChild(dayDiv);
    }

    function selectDay(element, day) {
      if (selectedDayElement) {
        selectedDayElement.classList.remove('selected');
      }

      element.classList.add('selected');
      selectedDayElement = element;

      showEvent(day);
    }

    function animateChange(callback) {
      description.classList.add('animate');

      setTimeout(() => {
        callback();
        description.classList.remove('animate');
      }, 300);
    }

    function showEvent(day) {
      animateChange(() => {
        if (day === 3) {
          description.innerHTML = "<strong>Almoço em família:</strong><br>Momento especial com a família.";
        } else if (day === 5) {
          description.innerHTML = "<strong>Compras do mês:</strong><br>Dia de comprar mantimentos e itens necessários.";
        }
      });
    }
  </script>

</body>
</html>
