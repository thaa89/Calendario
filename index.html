<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffe4ec;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      color: #d63384;
      margin: 10px 0;
      text-align: center;
      font-size: 24px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    button {
      margin: 10px 0;
      padding: 12px 22px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff4d88, #ff80ab);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      background: #ffc1d6;
      cursor: not-allowed;
      opacity: 0.6;
      box-shadow: none;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
      position: sticky;
      top: 0;
      background: #ffe4ec;
      z-index: 10;
    }

    .weekdays div {
      text-align: center;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4d88, #ff80ab);
      color: white;
      border-radius: 14px;
      padding: 18px 10px;
      font-size: 24px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .weekdays div:nth-child(1) {
      background: linear-gradient(135deg, #ff2e63, #ff6b81);
    }

    .weekdays div:nth-child(7) {
      background: linear-gradient(135deg, #6a5acd, #9370db);
    }

    .calendar {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .day {
      background-color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      transition: 0.2s;
      min-height: 85px;
      position: relative;
    }

    .day:hover {
      transform: scale(1.05);
    }

    .day span {
      font-size: 20px;
      font-weight: 900;
      margin-top: 4px;
    }

    .day:nth-child(7n+1) {
      background-color: #ffe5ec;
    }

    .day:nth-child(7n) {
      background-color: #e6e6fa;
    }

    .event {
      background-color: #ff80ab !important;
      color: white;
    }

    .selected {
      outline: 3px solid #d63384;
      transform: scale(1.05);
    }

    .event::after {
      content: '';
      width: 8px;
      height: 8px;
      background: red;
      border-radius: 50%;
      position: absolute;
      top: 6px;
      right: 6px;
    }

    .today {
      border: 3px solid #78b6be;
      background-color: #a2d8e0 !important;
    }

    .today::before {
      content: 'HOJE';
      font-size: 10px;
      color: #007281;
      position: absolute;
      bottom: 5px;
      right: 5px;
      font-weight: bold;
    }

    #description {
      padding: 20px;
      background-color: white;
      border-top: 3px solid #ff4d88;
      min-height: 120px;
      font-size: 18px;
    }

    /* 📱 CORREÇÃO MOBILE (ADICIONADO) */
    @media (max-width: 600px) {

      body {
        height: auto;
      }

      h1 {
        font-size: 18px;
      }

      .buttons {
        flex-direction: column;
        align-items: center;
      }

      button {
        width: 90%;
        justify-content: center;
        font-size: 14px;
        padding: 10px;
      }

      .weekdays {
        gap: 4px;
        padding: 6px;
      }

      .weekdays div {
        font-size: 12px;
        padding: 8px 2px;
        letter-spacing: 1px;
      }

      .calendar {
        gap: 4px;
        padding: 6px;
      }

      .day {
        min-height: 65px;
        padding: 4px;
        font-size: 11px;
      }

      .day span {
        font-size: 10px;
        line-height: 1.1;
      }

      .day div {
        font-size: 13px;
      }

      #description {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <h1 id="title"></h1>

  <div class="buttons">
    <button onclick="prevMonth()">← Mês anterior</button>
    <button onclick="nextMonth()">Próximo mês →</button>
  </div>

  <div class="weekdays" id="weekdays"></div>
  <div class="calendar" id="calendar"></div>

  <div id="description">Clique em um dia com evento para ver os detalhes.</div>

  <script>
    const calendar = document.getElementById('calendar');
    const weekdays = document.getElementById('weekdays');
    const description = document.getElementById('description');
    const title = document.getElementById('title');

    const year = 2026;
    let month = 2;

    const today = new Date();
    const todayDay = today.getDate();
    const todayMonth = today.getMonth();
    const todayYear = today.getFullYear();

   const eventsMarch = { 
    25: [ 
    { title: "PROVA Legislação empresarial", description: "Prova!!" }, 
    { title: "Questões Geografia", description: "Fazer as questões do livro e da apostila (pdf no grupo), NAO copiem as perguntas" },
    { title: "Trote", description: "Troca de gênero!!" } ],

     27: [ { title: "Experimento de Química", description: "Trazer materiais da lista (no grupo) para fazermos o exp. na sala" } ,
      { title: "Atividade de Ingles e Treino", description: "Fazer as questoes de ingles (pdf) no caderno e treino da serie" }
     ] ,

    31: [ 
      { title: "Prova de Quimica", description: " Prova!!" } ,
    { title: "Prova de Filosofia", description: "Prova, temas que vao cair no grupo."  },
    { title: "Seminario de Arte", description: "Apresentacao de alguns grupos" }
  ] 
  30: [
  { title: "Livro de Historia", description: "fazer pagina 19, manter no caderno" }
  
const eventsApril = { 
  1: [ 
    { title: "Prova de Geografia", description: "Prova de Geografia" } ,
    { title: "Prova de Fisica", description: "Temas no grupo" }
  ] ,
  2: [ 
    { title: "Prova de Protugues", description: "Prova" } ,
    { title: "Prova de Sociologia", description: "Prova" }
  ] ,
  
  3: [ 
    { title: "Exercicios de Fisica", description: "Entregar em folha separada..." } ,
  ],

  6: [ 
    { title: "Prova de Matematica", description: "Prova" } ,
    { title: "Prova de Artes", description: "Prova" } , 
    { title: "Trabalho de historia", description: "Trabalho em dupla com depoimento do site museu da pessoa" }
  ],

  7: [ 
    { title: "Prova de Ingles", description: "Prova" } ,
    { title: "Prova de Historia", description: "Prova" }
  ]
}

const eventsMay = {
  12: [
    { title: "Apresentação de Ingles", description: "Apresentação final Todo Mundo Odeia o Chris" }
  ] 
};

    const daysOfWeek = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio'];

    function getEvents() {
      if (month === 2) return eventsMarch;
      if (month === 3) return eventsApril;
      if (month === 4) return eventsMay;
      return {};
    }

    function renderCalendar() {
      calendar.innerHTML = "";
      weekdays.innerHTML = "";

      title.innerText = `Calendário de ${monthNames[month]}`;

      daysOfWeek.forEach(day => {
        const div = document.createElement('div');
        div.innerText = day;
        weekdays.appendChild(div);
      });

      const totalDays = new Date(year, month + 1, 0).getDate();
      const startDay = new Date(year, month, 1).getDay();
      const events = getEvents();

      for (let i = 0; i < startDay; i++) {
        calendar.appendChild(document.createElement('div'));
      }

      for (let i = 1; i <= totalDays; i++) {
        const dayDiv = document.createElement('div');
        dayDiv.classList.add('day');

        const number = document.createElement('div');
        number.innerText = i;
        dayDiv.appendChild(number);

        if (i === todayDay && month === todayMonth && year === todayYear) {
          dayDiv.classList.add('today');
        }

        if (events[i]) {
          dayDiv.classList.add('event');

          events[i].forEach(ev => {
            const span = document.createElement('span');
            span.innerText = ev.title;
            dayDiv.appendChild(span);
          });

          dayDiv.onclick = () => {
            let html = "";
            events[i].forEach(ev => {
              html += `<strong>${ev.title}</strong><br>${ev.description}<br><br>`;
            });
            description.innerHTML = html;
          };
        }

        calendar.appendChild(dayDiv);
      }

      updateButtons();
    }

    function nextMonth() {
      if (month < 4) {
        month++;
        renderCalendar();
      }
    }

    function prevMonth() {
      if (month > 2) {
        month--;
        renderCalendar();
      }
    }

    function updateButtons() {
      const buttons = document.querySelectorAll("button");
      buttons[0].disabled = (month === 2);
      buttons[1].disabled = (month === 4);
    }

    renderCalendar();

    function hidePastEvents() {
      const days = document.querySelectorAll('.day');

      days.forEach(dayDiv => {
        const numberDiv = dayDiv.querySelector('div');
        if (!numberDiv) return;

        const dayNumber = parseInt(numberDiv.innerText);

        const isPastDay =
          (year === todayYear && month === todayMonth && dayNumber < todayDay) ||
          (year === todayYear && month < todayMonth) ||
          (year < todayYear);

        if (isPastDay && dayDiv.classList.contains('event')) {
          dayDiv.classList.remove('event');

          const spans = dayDiv.querySelectorAll('span');
          spans.forEach(span => span.remove());

          dayDiv.onclick = null;
        }
      });
    } 

    const observer = new MutationObserver(() => {
      hidePastEvents();
    });

    observer.observe(document.getElementById('calendar'), {
      childList: true,
      subtree: true
    });

    hidePastEvents();
  </script>

</body>
</html>
